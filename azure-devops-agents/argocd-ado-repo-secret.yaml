# One-time setup: register the Azure DevOps repository in ArgoCD so it can
# clone private repos for application sync.
#
# 1. Fill in your values below (or use kubectl create secret directly)
# 2. Apply once:  kubectl apply -f argocd-ado-repo-secret.yaml
#
# The PAT needs:  Azure DevOps → Code (Read) scope
# Username can be any non-empty string (ADO ignores it for PAT auth).
# TODO: Explore another methods to argocd to authenticate to ADO since PAT it tied to user and expires.

apiVersion: v1
kind: Secret
metadata:
  name: ado-repo-creds
  namespace: argocd
  labels:
    # ArgoCD discovers repo credentials via this label
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  # Replace with your ADO org / project / repo
  url: https://dev.azure.com/<YOUR_ORG>/<YOUR_PROJECT>/_git/<YOUR_REPO>
  username: argocd          # any non-empty value works with PAT auth
  password: <YOUR_ADO_PAT>  # NEVER commit the real PAT — fill in before applying
