# One-time setup: register Azure DevOps org-level credentials in ArgoCD.
#
# Uses secret-type: repo-creds (credential TEMPLATE) so a single secret
# covers ALL repos under https://dev.azure.com/<YOUR_ORG>/ — no new secret
# needed for each scaffolded app.
#
# Steps:
#   1. Replace <YOUR_ORG> and <YOUR_ADO_PAT> below (do NOT commit the real PAT)
#   2. kubectl apply -f argocd-ado-repo-secret.yaml
#
# PAT scopes required: Azure DevOps → Code → Read
# Username can be any non-empty string; ADO uses the PAT for auth, not the username.
#
# Note: PATs expire — consider using a service principal or managed identity
# for production. See: https://argo-cd.readthedocs.io/en/stable/user-guide/private-repositories/

apiVersion: v1
kind: Secret
metadata:
  name: ado-org-repo-creds
  namespace: argocd
  labels:
    # repo-creds = credential template: matches any repo URL with this prefix
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  type: git
  # Prefix covers all repos in your ADO org — replace <YOUR_ORG>
  url: https://dev.azure.com/<YOUR_ORG>/
  username: argocd          # any non-empty value works with PAT auth
  password: <YOUR_ADO_PAT>  # NEVER commit the real PAT — fill in locally before applying
